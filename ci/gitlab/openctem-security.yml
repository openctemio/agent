# =============================================================================
# DAST - Dynamic Application Security Testing
# =============================================================================
# NOTE: DAST is SEPARATE from CI workflow. It scans running applications.
#
# Usage:
#   stages:
#     - deploy
#     - dast
#
#   deploy-staging:
#     stage: deploy
#     script: ...
#
#   dast:
#     extends: .openctem-dast
#     needs: [deploy-staging]
#     variables:
#       TARGET_URL: "https://staging.example.com"

.openctem-dast:
  extends: .openctem-dast-base
  variables:
    TARGET_URL: ""  # REQUIRED: Set this to your staging/test URL
  script:
    - |
      if [ -z "$TARGET_URL" ]; then
        echo "Error: TARGET_URL variable not set"
        echo "DAST requires a running application URL to scan"
        exit 1
      fi

      VERBOSE_FLAG=""
      PUSH_FLAG=""
      if [ "$VERBOSE" = "true" ]; then
        VERBOSE_FLAG="-verbose"
      fi
      if [ "$PUSH" = "true" ]; then
        PUSH_FLAG="-push"
      fi

      agent -tool nuclei \
        -target $TARGET_URL \
        -auto-ci \
        $PUSH_FLAG \
        -fail-on $FAIL_ON \
        -output-format sarif \
        -output gl-dast-report.json \
        $VERBOSE_FLAG
  artifacts:
    paths:
      - gl-dast-report.json
    when: always
    expire_in: 1 week
  allow_failure:
    exit_codes:
      - 1

# =============================================================================
# Full CI Security Scan (SAST + Secrets + SCA - NO DAST)
# =============================================================================

.openctem-full-scan:
  extends: .openctem-base
  script:
    - |
      VERBOSE_FLAG=""
      PUSH_FLAG=""
      COMMENTS_FLAG=""
      if [ "$VERBOSE" = "true" ]; then
        VERBOSE_FLAG="-verbose"
      fi
      if [ "$PUSH" = "true" ]; then
        PUSH_FLAG="-push"
      fi
      if [ "$COMMENTS" = "true" ]; then
        COMMENTS_FLAG="-comments"
      fi

      # CI scan: semgrep + gitleaks + trivy (NO nuclei)
      agent -tools semgrep,gitleaks,trivy \
        -target . \
        -auto-ci \
        $PUSH_FLAG \
        $COMMENTS_FLAG \
        -fail-on $FAIL_ON \
        -output-format sarif \
        -output gl-security-report.json \
        $VERBOSE_FLAG
  artifacts:
    reports:
      sast: gl-security-report.json
    paths:
      - gl-security-report.json
    when: always
    expire_in: 1 week
  allow_failure:
    exit_codes:
      - 1

# =============================================================================
# Recommended: Parallel Scan (Fastest)
# =============================================================================
# Usage:
#   stages:
#     - security
#
#   sast:
#     extends: .openctem-sast
#
#   secrets:
#     extends: .openctem-secrets
#
#   sca:
#     extends: .openctem-sca
#
# This runs all 3 scans in parallel with lightweight per-tool images.
# Total time = max(sast, secrets, sca) instead of sum.
#
# For DAST, add a separate stage AFTER deployment:
#
#   stages:
#     - security
#     - build
#     - deploy
#     - dast
#
#   dast:
#     extends: .openctem-dast
#     stage: dast
#     needs: [deploy-staging]
#     variables:
#       TARGET_URL: "https://staging.example.com"
