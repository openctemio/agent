# OpenCTEM Parallel Security Scanning - GitLab CI
#
# Runs SAST, Secrets, and SCA scans in PARALLEL for faster CI.
# Total time = max(sast, secrets, sca) instead of sum.
#
# Usage:
#   include:
#     - remote: 'https://raw.githubusercontent.com/openctemio/agent/main/ci/gitlab/parallel-security.yml'
#
#   stages:
#     - security
#
#   # All 3 jobs run in parallel automatically
#
# For more options, see: https://docs.openctem.io/ci/gitlab
#
# =============================================================================
# Tool Update Mechanism
# =============================================================================
# SEMGREP: Rules fetched from Registry on every scan (always fresh)
# TRIVY: DB auto-downloads on first use, updates every 6 hours
# GITLEAKS: Rules embedded in binary, update by pulling latest image
# =============================================================================

# =============================================================================
# Variables (Override in your .gitlab-ci.yml)
# =============================================================================
variables:
  # Push results to platform (requires API_KEY)
  # Set to "false" for testing or when API_KEY is not available
  PUSH: "true"

  # Enable PR/MR comments
  COMMENTS: "true"

  # Security gate threshold
  FAIL_ON: "critical"

  # Enable verbose output
  VERBOSE: "false"

# =============================================================================
# SAST - Static Application Security Testing (Semgrep)
# =============================================================================
openctem-sast:
  stage: security
  image: openctemio/agent:semgrep
  variables:
    GIT_DEPTH: 0
  before_script:
    - |
      if [ "$PUSH" = "true" ] && [ -z "$API_KEY" ]; then
        echo "Info: API_KEY not set. Push disabled (scan-only mode)."
        export PUSH="false"
      fi
  script:
    - |
      VERBOSE_FLAG=""
      PUSH_FLAG=""
      COMMENTS_FLAG=""
      if [ "$VERBOSE" = "true" ]; then
        VERBOSE_FLAG="-verbose"
      fi
      if [ "$PUSH" = "true" ]; then
        PUSH_FLAG="-push"
      fi
      if [ "$COMMENTS" = "true" ]; then
        COMMENTS_FLAG="-comments"
      fi

      agent -tool semgrep \
        -target . \
        -auto-ci \
        $PUSH_FLAG \
        $COMMENTS_FLAG \
        -fail-on $FAIL_ON \
        -output-format sarif \
        -output gl-sast-report.json \
        $VERBOSE_FLAG
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    when: always
    expire_in: 1 week
  allow_failure:
    exit_codes:
      - 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# Secrets Detection (Gitleaks)
# =============================================================================
openctem-secrets:
  stage: security
  image: openctemio/agent:gitleaks
  variables:
    GIT_DEPTH: 0
  before_script:
    - |
      if [ "$PUSH" = "true" ] && [ -z "$API_KEY" ]; then
        echo "Info: API_KEY not set. Push disabled (scan-only mode)."
        export PUSH="false"
      fi
  script:
    - |
      VERBOSE_FLAG=""
      PUSH_FLAG=""
      COMMENTS_FLAG=""
      if [ "$VERBOSE" = "true" ]; then
        VERBOSE_FLAG="-verbose"
      fi
      if [ "$PUSH" = "true" ]; then
        PUSH_FLAG="-push"
      fi
      if [ "$COMMENTS" = "true" ]; then
        COMMENTS_FLAG="-comments"
      fi

      agent -tool gitleaks \
        -target . \
        -auto-ci \
        $PUSH_FLAG \
        $COMMENTS_FLAG \
        -fail-on $FAIL_ON \
        -output-format sarif \
        -output gl-secret-detection-report.json \
        $VERBOSE_FLAG
  artifacts:
    reports:
      secret_detection: gl-secret-detection-report.json
    paths:
      - gl-secret-detection-report.json
    when: always
    expire_in: 1 week
  allow_failure:
    exit_codes:
      - 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# SCA - Software Composition Analysis (Trivy)
# =============================================================================
openctem-sca:
  stage: security
  image: openctemio/agent:trivy
  variables:
    TRIVY_CACHE_DIR: /cache/trivy
  cache:
    key: trivy-db-${CI_COMMIT_REF_SLUG}
    paths:
      - /cache/trivy
    policy: pull-push
  before_script:
    - |
      if [ "$PUSH" = "true" ] && [ -z "$API_KEY" ]; then
        echo "Info: API_KEY not set. Push disabled (scan-only mode)."
        export PUSH="false"
      fi
      mkdir -p /cache/trivy
      echo "Trivy will download/update vulnerability DB if needed..."
  script:
    - |
      VERBOSE_FLAG=""
      PUSH_FLAG=""
      if [ "$VERBOSE" = "true" ]; then
        VERBOSE_FLAG="-verbose"
      fi
      if [ "$PUSH" = "true" ]; then
        PUSH_FLAG="-push"
      fi

      agent -tool trivy \
        -target . \
        -auto-ci \
        $PUSH_FLAG \
        -fail-on $FAIL_ON \
        -output-format sarif \
        -output gl-dependency-scanning-report.json \
        $VERBOSE_FLAG
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    paths:
      - gl-dependency-scanning-report.json
    when: always
    expire_in: 1 week
  allow_failure:
    exit_codes:
      - 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# Security Summary (Optional - runs after all scans)
# =============================================================================
openctem-summary:
  stage: security
  image: alpine:latest
  needs:
    - job: openctem-sast
      artifacts: true
    - job: openctem-secrets
      artifacts: true
    - job: openctem-sca
      artifacts: true
  before_script:
    - apk add --no-cache jq
  script:
    - |
      echo "=== Security Scan Summary ==="
      echo ""

      SAST_COUNT=0
      SECRETS_COUNT=0
      SCA_COUNT=0

      if [ -f gl-sast-report.json ]; then
        SAST_COUNT=$(jq '[.runs[].results[]] | length' gl-sast-report.json 2>/dev/null || echo 0)
      fi

      if [ -f gl-secret-detection-report.json ]; then
        SECRETS_COUNT=$(jq '[.runs[].results[]] | length' gl-secret-detection-report.json 2>/dev/null || echo 0)
      fi

      if [ -f gl-dependency-scanning-report.json ]; then
        SCA_COUNT=$(jq '[.runs[].results[]] | length' gl-dependency-scanning-report.json 2>/dev/null || echo 0)
      fi

      TOTAL=$((SAST_COUNT + SECRETS_COUNT + SCA_COUNT))

      echo "SAST (Semgrep):      $SAST_COUNT findings"
      echo "Secrets (Gitleaks):  $SECRETS_COUNT findings"
      echo "SCA (Trivy):         $SCA_COUNT findings"
      echo "----------------------------"
      echo "Total:               $TOTAL findings"
      echo ""

      # Create summary artifact
      cat > security-summary.json << EOF
      {
        "sast": $SAST_COUNT,
        "secrets": $SECRETS_COUNT,
        "sca": $SCA_COUNT,
        "total": $TOTAL,
        "pipeline_id": "$CI_PIPELINE_ID",
        "commit": "$CI_COMMIT_SHA",
        "branch": "$CI_COMMIT_REF_NAME"
      }
      EOF

      echo "Summary saved to security-summary.json"
  artifacts:
    paths:
      - security-summary.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true
