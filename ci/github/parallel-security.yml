# OpenCTEM Parallel Security Scanning - GitHub Actions
#
# Runs SAST, Secrets, and SCA scans in PARALLEL for faster CI.
# Total time = max(sast, secrets, sca) instead of sum.
#
# Usage:
#   name: Security
#   on: [push, pull_request]
#
#   jobs:
#     security:
#       uses: openctemio/agent/.github/workflows/parallel-security.yml@main
#       secrets:
#         api_url: ${{ secrets.API_URL }}
#         api_key: ${{ secrets.API_KEY }}
#
# For more options, see: https://docs.openctem.io/ci/github

name: OpenCTEM Parallel Security Scan

on:
  workflow_call:
    inputs:
      # Security gate threshold
      fail_on:
        description: 'Fail if findings >= severity (critical, high, medium, low)'
        type: string
        default: 'critical'
        required: false

      # Target path
      target:
        description: 'Target path to scan'
        type: string
        default: '.'
        required: false

      # Enable/disable individual scans
      enable_sast:
        description: 'Enable SAST scanning (Semgrep)'
        type: boolean
        default: true
        required: false

      enable_secrets:
        description: 'Enable secrets scanning (Gitleaks)'
        type: boolean
        default: true
        required: false

      enable_sca:
        description: 'Enable SCA scanning (Trivy)'
        type: boolean
        default: true
        required: false

      # PR comments
      comments:
        description: 'Post findings as PR comments'
        type: boolean
        default: true
        required: false

      # Push to OpenCTEM
      push:
        description: 'Push results to OpenCTEM platform'
        type: boolean
        default: true
        required: false

      # Verbose output
      verbose:
        description: 'Enable verbose output'
        type: boolean
        default: false
        required: false

      # Upload to GitHub Security tab
      upload_sarif:
        description: 'Upload SARIF to GitHub Security tab'
        type: boolean
        default: true
        required: false

    secrets:
      api_url:
        description: 'OpenCTEM API URL'
        required: false
      api_key:
        description: 'OpenCTEM API Key'
        required: false

    outputs:
      sast_findings:
        description: 'Number of SAST findings'
        value: ${{ jobs.sast.outputs.findings_count }}
      secrets_findings:
        description: 'Number of secrets findings'
        value: ${{ jobs.secrets.outputs.findings_count }}
      sca_findings:
        description: 'Number of SCA findings'
        value: ${{ jobs.sca.outputs.findings_count }}
      total_findings:
        description: 'Total findings across all scans'
        value: ${{ jobs.summary.outputs.total_findings }}
      security_gate:
        description: 'Security gate result (pass/fail)'
        value: ${{ jobs.summary.outputs.security_gate }}

jobs:
  # ===========================================================================
  # SAST - Static Application Security Testing (Semgrep)
  # Rules: Auto-fetched from Semgrep Registry (always fresh)
  # ===========================================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    if: inputs.enable_sast
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    outputs:
      findings_count: ${{ steps.scan.outputs.findings_count }}
      exit_code: ${{ steps.scan.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SAST Scan
        id: scan
        uses: docker://openctemio/agent:semgrep
        with:
          args: >-
            -tool semgrep
            -target ${{ inputs.target }}
            -auto-ci
            ${{ inputs.comments && '-comments' || '' }}
            ${{ inputs.push && '-push' || '' }}
            ${{ inputs.verbose && '-verbose' || '' }}
            -fail-on ${{ inputs.fail_on }}
            -output-format sarif
            -output sast-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ secrets.api_url }}
          API_KEY: ${{ secrets.api_key }}
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: inputs.upload_sarif && always()
        with:
          sarif_file: sast-results.sarif
          category: sast
        continue-on-error: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-results
          path: sast-results.sarif
          retention-days: 30

  # ===========================================================================
  # Secrets Detection (Gitleaks)
  # Rules: Embedded in binary, always up-to-date with latest image
  # ===========================================================================
  secrets:
    name: Secrets (Gitleaks)
    runs-on: ubuntu-latest
    if: inputs.enable_secrets
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    outputs:
      findings_count: ${{ steps.scan.outputs.findings_count }}
      exit_code: ${{ steps.scan.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets Scan
        id: scan
        uses: docker://openctemio/agent:gitleaks
        with:
          args: >-
            -tool gitleaks
            -target ${{ inputs.target }}
            -auto-ci
            ${{ inputs.comments && '-comments' || '' }}
            ${{ inputs.push && '-push' || '' }}
            ${{ inputs.verbose && '-verbose' || '' }}
            -fail-on ${{ inputs.fail_on }}
            -output-format sarif
            -output secrets-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ secrets.api_url }}
          API_KEY: ${{ secrets.api_key }}
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: inputs.upload_sarif && always()
        with:
          sarif_file: secrets-results.sarif
          category: secrets
        continue-on-error: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-results
          path: secrets-results.sarif
          retention-days: 30

  # ===========================================================================
  # SCA - Software Composition Analysis (Trivy)
  # DB: Auto-downloads on first use, updates every 6 hours
  # ===========================================================================
  sca:
    name: SCA (Trivy)
    runs-on: ubuntu-latest
    if: inputs.enable_sca
    permissions:
      contents: read
      security-events: write

    outputs:
      findings_count: ${{ steps.scan.outputs.findings_count }}
      exit_code: ${{ steps.scan.outputs.exit_code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SCA Scan
        id: scan
        uses: docker://openctemio/agent:trivy
        with:
          args: >-
            -tool trivy
            -target ${{ inputs.target }}
            -auto-ci
            ${{ inputs.push && '-push' || '' }}
            ${{ inputs.verbose && '-verbose' || '' }}
            -fail-on ${{ inputs.fail_on }}
            -output-format sarif
            -output sca-results.sarif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ secrets.api_url }}
          API_KEY: ${{ secrets.api_key }}
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: inputs.upload_sarif && always()
        with:
          sarif_file: sca-results.sarif
          category: sca
        continue-on-error: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-results
          path: sca-results.sarif
          retention-days: 30

  # ===========================================================================
  # Summary - Aggregate results and determine security gate
  # ===========================================================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast, secrets, sca]
    if: always()

    outputs:
      total_findings: ${{ steps.aggregate.outputs.total }}
      security_gate: ${{ steps.aggregate.outputs.gate }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results
        continue-on-error: true

      - name: Aggregate Results
        id: aggregate
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count findings from each scan
          SAST_COUNT=0
          SECRETS_COUNT=0
          SCA_COUNT=0

          if [ -f results/sast-results/sast-results.sarif ]; then
            SAST_COUNT=$(jq '[.runs[].results[]] | length' results/sast-results/sast-results.sarif 2>/dev/null || echo 0)
          fi

          if [ -f results/secrets-results/secrets-results.sarif ]; then
            SECRETS_COUNT=$(jq '[.runs[].results[]] | length' results/secrets-results/secrets-results.sarif 2>/dev/null || echo 0)
          fi

          if [ -f results/sca-results/sca-results.sarif ]; then
            SCA_COUNT=$(jq '[.runs[].results[]] | length' results/sca-results/sca-results.sarif 2>/dev/null || echo 0)
          fi

          TOTAL=$((SAST_COUNT + SECRETS_COUNT + SCA_COUNT))

          echo "| Scan | Findings |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | $SAST_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets (Gitleaks) | $SECRETS_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| SCA (Trivy) | $SCA_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY

          echo "total=$TOTAL" >> $GITHUB_OUTPUT

          # Determine security gate
          SAST_EXIT="${{ needs.sast.outputs.exit_code }}"
          SECRETS_EXIT="${{ needs.secrets.outputs.exit_code }}"
          SCA_EXIT="${{ needs.sca.outputs.exit_code }}"

          if [ "$SAST_EXIT" = "1" ] || [ "$SECRETS_EXIT" = "1" ] || [ "$SCA_EXIT" = "1" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Security Gate: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "gate=fail" >> $GITHUB_OUTPUT
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Security Gate: PASSED" >> $GITHUB_STEP_SUMMARY
            echo "gate=pass" >> $GITHUB_OUTPUT
          fi

      - name: Check Security Gate
        if: steps.aggregate.outputs.gate == 'fail'
        run: |
          echo "Security gate failed - findings exceed threshold"
          exit 1
